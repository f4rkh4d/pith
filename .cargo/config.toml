[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "link-arg=-Tkernel/src/linker.ld",
    "-C", "link-arg=-no-pie",
    "-C", "code-model=medium",
    "-C", "relocation-model=static",
    "-C", "force-frame-pointers=yes",
]
runner = "scripts/run.sh"
